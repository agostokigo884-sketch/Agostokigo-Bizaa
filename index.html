<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGOSTOKIGOHUB</title>

<style>
body{
background:#12051c;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.card{
width:420px;
background:rgba(25,10,40,0.9);
padding:25px;
border-radius:15px;
}

.hidden{display:none;}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
background:#d4af37;
font-weight:bold;
cursor:pointer;
}

a{color:#d4af37;cursor:pointer;font-size:13px;display:block;margin-top:10px;text-align:center;}

.topbar{
position:fixed;
top:0;left:0;right:0;
display:none;
justify-content:space-between;
padding:15px;
background:#1a0826;
color:white;
}
</style>
</head>

<body>

<div class="topbar" id="topbar">
<div>AGOSTOKIGOHUB</div>
<button onclick="logout()">Logout</button>
</div>

<!-- REGISTER -->
<div class="card" id="registerCard">
<h2>Register</h2>

<input id="rname" placeholder="Name">
<input id="remail" placeholder="Email">
<input id="rpass" type="password" placeholder="Password">

<button onclick="register()">Sign Up</button>

<a onclick="show('login')">Already have account? Login</a>
</div>

<!-- LOGIN -->
<div class="card hidden" id="loginCard">
<h2>Login</h2>

<input id="lemail" placeholder="Email">
<input id="lpass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<a onclick="show('register')">Create account</a>
<a onclick="show('reset')">Forgot Password?</a>
</div>

<!-- RESET -->
<div class="card hidden" id="resetCard">
<h2>Reset Password</h2>

<input id="rem" placeholder="Email">
<button onclick="resetPass()">Send Reset Link</button>

<a onclick="show('login')">Back</a>
</div>

<!-- USER -->
<div class="card hidden" id="userCard">
<h2>Welcome User</h2>
<p>Login successful 🎉</p>
</div>

<!-- ADMIN -->
<div class="card hidden" id="adminCard">
<h2>Admin Dashboard</h2>
<p>Welcome Admin 🔐</p>

<button onclick="loadUsers()">Load Users</button>
<div id="users"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const ADMIN_EMAIL = "agostokigo884@gmail.com";

/* ✅ YOUR SUPABASE CONNECTION */
const supabaseUrl = "https://hcxqakwuqryxqfxipmqb.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjeHFha3d1cXJ5eHFmeGlwbXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjI0NzEsImV4cCI6MjA5NDY5ODQ3MX0.n0000puRmXE-1jA4PpnV7rj3QGDDZEDcIMboUUc_5Q4";

const client = supabase.createClient(supabaseUrl, supabaseKey);

/* NAVIGATION */
function show(page){
registerCard.classList.add("hidden");
loginCard.classList.add("hidden");
resetCard.classList.add("hidden");
userCard.classList.add("hidden");
adminCard.classList.add("hidden");

if(page==="login") loginCard.classList.remove("hidden");
if(page==="register") registerCard.classList.remove("hidden");
if(page==="reset") resetCard.classList.remove("hidden");
}

/* REGISTER */
async function register(){

const {error} = await client.auth.signUp({
email: remail.value,
password: rpass.value,
options:{data:{name:rname.value}}
});

if(error){
alert(error.message);
return;
}

alert("Registered successfully ✔ Please login");
show("login");
}

/* LOGIN */
async function login(){

const {error} = await client.auth.signInWithPassword({
email: lemail.value,
password: lpass.value
});

if(error){
alert(error.message);
return;
}

document.getElementById("topbar").style.display="flex";

const {data:{user}} = await client.auth.getUser();

if(user.email === ADMIN_EMAIL){
adminCard.classList.remove("hidden");
loadUsers();
}else{
userCard.classList.remove("hidden");
}
}

/* RESET PASSWORD */
async function resetPass(){

const {error} = await client.auth.resetPasswordForEmail(rem.value,{
redirectTo: window.location.origin
});

if(error){
alert(error.message);
return;
}

alert("Reset link sent to email ✔");
show("login");
}

/* LOAD USERS (ADMIN ONLY) */
async function loadUsers(){

const { data } = await client.auth.admin.listUsers();

users.innerHTML = data.users.map(u => `
<p>📧 ${u.email}</p>
`).join("");
}

/* LOGOUT */
async function logout(){
await client.auth.signOut();
location.reload();
}

/* AUTO LOGIN */
async function check(){

const {data:{user}} = await client.auth.getUser();

if(user){
document.getElementById("topbar").style.display="flex";

if(user.email === ADMIN_EMAIL){
adminCard.classList.remove("hidden");
loadUsers();
}else{
userCard.classList.remove("hidden");
}
}
}

check();
</script>

</body>
</html>
