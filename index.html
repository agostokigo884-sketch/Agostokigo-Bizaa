<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGOSTOKIGOHUB</title>

<style>
body{
background:#12051c;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.card{
width:420px;
background:rgba(25,10,40,0.9);
padding:25px;
border-radius:15px;
}

.hidden{display:none;}

input,button,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
background:#d4af37;
font-weight:bold;
cursor:pointer;
}

a{color:#d4af37;cursor:pointer;font-size:13px;display:block;margin-top:10px;text-align:center;}

.topbar{
position:fixed;
top:0;left:0;right:0;
display:none;
justify-content:space-between;
padding:15px;
background:#1a0826;
}
</style>
</head>

<body>

<div class="topbar" id="topbar">
<div>AGOSTOKIGOHUB</div>
<button onclick="logout()">Logout</button>
</div>

<!-- REGISTER -->
<div class="card" id="registerCard">
<h2>Register</h2>
<input id="rname" placeholder="Name">
<input id="remail" placeholder="Email">
<input id="rpass" type="password" placeholder="Password">
<button onclick="register()">Sign Up</button>
<a onclick="show('login')">Already have account? Login</a>
</div>

<!-- LOGIN -->
<div class="card hidden" id="loginCard">
<h2>Login</h2>
<input id="lemail" placeholder="Email">
<input id="lpass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<a onclick="show('register')">Create account</a>
<a onclick="show('reset')">Forgot Password?</a>
</div>

<!-- RESET -->
<div class="card hidden" id="resetCard">
<h2>Reset Password</h2>
<input id="rem" placeholder="Email">
<button onclick="resetPass()">Send Reset Link</button>
<a onclick="show('login')">Back</a>
</div>

<!-- USER DASHBOARD -->
<div class="card hidden" id="userCard">
<h2>User Dashboard</h2>

<p id="userEmail"></p>

<h3>Submit Payment</h3>
<textarea id="payMsg" placeholder="Mpesa message"></textarea>
<button onclick="sendPayment()">Submit</button>
</div>

<!-- ADMIN DASHBOARD -->
<div class="card hidden" id="adminCard">
<h2>Admin Dashboard</h2>

<button onclick="loadData()">Refresh Data</button>

<h3>Users</h3>
<div id="users"></div>

<h3>Payments</h3>
<div id="payments"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const ADMIN_EMAIL = "agostokigo884@gmail.com";

const supabaseUrl = "https://hcxqakwuqryxqfxipmqb.supabase.co";
const supabaseKey = "YOUR_ANON_KEY_HERE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

/* NAV */
function show(page){
registerCard.classList.add("hidden");
loginCard.classList.add("hidden");
resetCard.classList.add("hidden");
userCard.classList.add("hidden");
adminCard.classList.add("hidden");

if(page==="login") loginCard.classList.remove("hidden");
if(page==="register") registerCard.classList.remove("hidden");
if(page==="reset") resetCard.classList.remove("hidden");
}

/* REGISTER */
async function register(){
const { data, error } = await client.auth.signUp({
email: remail.value,
password: rpass.value,
options:{data:{name:rname.value}}
});

if(error) return alert(error.message);

alert("Check email to confirm");

await client.from("profiles").insert({
id: data.user.id,
email: remail.value,
role: "user"
});

show("login");
}

/* LOGIN */
async function login(){
const { data, error } = await client.auth.signInWithPassword({
email: lemail.value,
password: lpass.value
});

if(error) return alert(error.message);

const user = data.user;

document.getElementById("topbar").style.display="flex";
userEmail.innerText = user.email;

/* check role */
const { data: profile } = await client
.from("profiles")
.select("*")
.eq("id", user.id)
.single();

if(profile?.role === "admin" || user.email === ADMIN_EMAIL){
adminCard.classList.remove("hidden");
loadData();
}else{
userCard.classList.remove("hidden");
}
}

/* RESET PASSWORD */
async function resetPass(){
const { error } = await client.auth.resetPasswordForEmail(rem.value);
if(error) return alert(error.message);

alert("Reset link sent");
show("login");
}

/* SEND PAYMENT */
async function sendPayment(){
const { data: { user } } = await client.auth.getUser();

const { error } = await client.from("payments").insert({
email: user.email,
full_name: user.email,
message: payMsg.value
});

if(error) return alert(error.message);

alert("Payment submitted");
}

/* LOAD ADMIN DATA */
async function loadData(){

const { data: usersData } = await client.from("profiles").select("*");
const { data: payData } = await client.from("payments").select("*");

users.innerHTML = usersData.map(u=>`
<p>📧 ${u.email} (${u.role})</p>
`).join("");

payments.innerHTML = payData.map(p=>`
<p><b>${p.email}</b><br>${p.message}</p>
`).join("");
}

/* LOGOUT */
async function logout(){
await client.auth.signOut();
location.reload();
}

/* AUTO LOGIN */
async function check(){
const { data: { session } } = await client.auth.getSession();

if(session){
const user = session.user;

document.getElementById("topbar").style.display="flex";
userEmail.innerText = user.email;

const { data: profile } = await client
.from("profiles")
.select("*")
.eq("id", user.id)
.single();

if(profile?.role === "admin" || user.email === ADMIN_EMAIL){
adminCard.classList.remove("hidden");
loadData();
}else{
userCard.classList.remove("hidden");
}
}
}

check();
</script>

</body>
</html>
