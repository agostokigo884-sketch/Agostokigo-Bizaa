<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGOSTOKIGOHUB</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}

body{
background:#12051c;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.top-navbar{
position:fixed;
top:0;left:0;right:0;
display:none;
justify-content:space-between;
padding:15px 25px;
background:rgba(25,10,40,0.9);
color:white;
z-index:100;
}

.auth-card{
width:100%;
max-width:450px;
background:rgba(25,10,40,0.85);
padding:35px;
border-radius:16px;
}

.hidden{display:none;}

h2{color:#d4af37;text-align:center;margin-bottom:20px;}

input,textarea{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.08);
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#d4af37;
font-weight:bold;
cursor:pointer;
}

.link{
color:#d4af37;
cursor:pointer;
text-align:center;
display:block;
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="top-navbar" id="topNavbar">
<div>AGOSTOKIGOHUB</div>
<button onclick="logout()">Logout</button>
</div>

<!-- REGISTER -->
<div class="auth-card" id="registerCard">
<h2>Register</h2>

<input id="regName" placeholder="Full Name">
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">
<input id="confirmPassword" type="password" placeholder="Confirm Password">

<button onclick="register()">Sign Up</button>

<span class="link" onclick="showCard('loginCard')">Already have account? Login</span>
</div>

<!-- LOGIN -->
<div class="auth-card hidden" id="loginCard">
<h2>Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<span class="link" onclick="showCard('registerCard')">Create account</span>
<span class="link" onclick="showCard('resetCard')">Forgot Password?</span>
</div>

<!-- RESET PASSWORD -->
<div class="auth-card hidden" id="resetCard">
<h2>Reset Password</h2>

<input id="resetEmail" placeholder="Enter your email">

<button onclick="resetPassword()">Send Reset Link</button>

<span class="link" onclick="showCard('loginCard')">Back to Login</span>
</div>

<!-- INTRO -->
<div class="auth-card hidden" id="introCard">
<h2>Welcome</h2>
<p style="color:white;text-align:center;">Login successful</p>
</div>

<!-- ADMIN -->
<div class="auth-card hidden" id="adminCard">
<h2>Admin Dashboard</h2>
<p style="color:white;">Welcome Admin</p>
<button onclick="logout()">Logout Admin</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const ADMIN_EMAIL = "agostokigo884@gmail.com";

const client = supabase.createClient(
"https://hcxqakwuqryxqfxipmqb.supabase.co",
"YOUR_SUPABASE_ANON_KEY"
);

/* NAVIGATION */
function showCard(id){
["registerCard","loginCard","resetCard","introCard","adminCard"]
.forEach(c=>document.getElementById(c).classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");
}

/* REGISTER */
async function register(){

if(regPassword.value !== confirmPassword.value){
alert("Passwords do not match");
return;
}

const {error} = await client.auth.signUp({
email: regEmail.value,
password: regPassword.value,
options:{data:{full_name: regName.value}}
});

if(error) return alert(error.message);

alert("Registered! Please login");
showCard("loginCard");
loginEmail.value = regEmail.value;
}

/* LOGIN */
async function login(){

const {error} = await client.auth.signInWithPassword({
email: loginEmail.value,
password: loginPassword.value
});

if(error){
alert(error.message);
return;
}

document.body.style.background="#1a0826";
document.getElementById("topNavbar").style.display="flex";

if(loginEmail.value === ADMIN_EMAIL){
showCard("adminCard");
}else{
showCard("introCard");
}
}

/* FORGOT PASSWORD */
async function resetPassword(){

const email = resetEmail.value;

const {error} = await client.auth.resetPasswordForEmail(email, {
redirectTo: window.location.origin
});

if(error){
alert(error.message);
return;
}

alert("Password reset link sent to email");
showCard("loginCard");
}

/* LOGOUT */
async function logout(){
await client.auth.signOut();
location.reload();
}

/* AUTO LOGIN */
async function checkUser(){

const {data:{user}} = await client.auth.getUser();

if(user){
document.getElementById("topNavbar").style.display="flex";

if(user.email === ADMIN_EMAIL){
showCard("adminCard");
}else{
showCard("introCard");
}
}
}

checkUser();
</script>

</body>
</html>
